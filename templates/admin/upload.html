{% extends "admin/base.html" %}

{% block title %}Upload Product{% endblock %}

{% block admin_content %}
<div class="card shadow-lg border-0">
    <div class="card-header bg-gradient-success text-white py-4">
        <h2 class="mb-0 fw-bold">
            <i class="fas fa-plus-circle me-3"></i>
            Upload New Product
        </h2>
    </div>
    <div class="card-body p-5">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-8">
                    <!-- Product Details -->
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5">Product Name</label>
                        <input type="text" class="form-control form-control-lg" name="name" required>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5">Price (Leones)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg" name="price" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5">Category</label>
                            <select class="form-select form-select-lg" name="category" required>
                                {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="is_new" id="is_new">
                                <label class="form-check-label fw-bold" for="is_new">
                                    <i class="fas fa-crown text-warning me-2"></i>Mark as New Product
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="is_hot" id="is_hot">
                                <label class="form-check-label fw-bold" for="is_hot">
                                    <i class="fas fa-fire text-danger me-2"></i>Mark as Hot Product
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5">Product Description</label>
                        <textarea class="form-control" rows="4" name="description" required></textarea>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <!-- Add Category Button -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-light">
                            <h6 class="fw-bold mb-0">Add New Category</h6>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <input type="text" class="form-control" id="newCategoryName" placeholder="Category name">
                                <button class="btn btn-outline-primary" type="button" id="addCategoryBtn">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Image Upload Preview -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-light">
                            <h6 class="fw-bold mb-0">Product Photos (Max 4)</h6>
                            <small class="text-muted">First photo will be thumbnail</small>
                        </div>
                        <div class="card-body">
                            <input type="file" class="form-control" name="photos" multiple accept="image/*" required>
                            <div id="imagePreview" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <hr class="my-5">
            
            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-success btn-lg fw-bold py-4 fs-4">
                    <i class="fas fa-upload me-3"></i>
                    Upload Product
                </button>
                <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary py-3">
                    <i class="fas fa-arrow-left me-2"></i>Back to Products
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
